        <!-- Improved JavaScript to aggressively style the form after it loads -->
        <script>
          // This script applies the Bebas Neue font to Cognito Forms
          (function() {
            // First, add global stylesheet to head immediately
            var globalStyles = document.createElement('style');
            globalStyles.innerHTML = `
              /* Global styles for all Cognito forms */
              .cognito * { font-family: 'Bebas Neue', sans-serif !important; }
              .cog-cognito * { font-family: 'Bebas Neue', sans-serif !important; }
              
              /* Force any iframes containing Cognito Forms to inherit fonts */
              iframe[src*='cognitoforms.com'] { font-family: 'Bebas Neue', sans-serif !important; }
              
              /* Add gray background to match site styling */
              #c-forms-container, #c-forms-form-container, 
              .cognito, .cog-cognito, 
              .c-forms-form, .cog-form, 
              #c-forms-form-60, #c-forms-form-59 {
                background-color: #f2f2f2 !important;
                padding: 15px !important;
                border-radius: 5px !important;
              }
              
              /* Target form IDs directly - both forms just to be safe */
              #c-forms-form-60 *, #c-forms-form-59 * { font-family: 'Bebas Neue', sans-serif !important; }
              
              /* CSS Variables approach as recommended by Cognito */
              :root .cog-cognito {
                --font-family: 'Bebas Neue', sans-serif !important;
                --input__font-family: 'Bebas Neue', sans-serif !important;
                --button__font-family: 'Bebas Neue', sans-serif !important;
                --label__font-family: 'Bebas Neue', sans-serif !important;
                --heading__font-family: 'Bebas Neue', sans-serif !important;
                --field-message__font-family: 'Bebas Neue', sans-serif !important;
              }
            `;
            document.head.appendChild(globalStyles);
            
            // Helper function to apply styles to a specific element
            function applyStylesToElement(element) {
              if (!element) return;
              
              // Apply inline styles to all children recursively
              function styleAllChildren(parent) {
                if (!parent) return;
                
                // Style the parent
                parent.style.fontFamily = "'Bebas Neue', sans-serif";
                
                // Style all children
                for (var i = 0; i < parent.children.length; i++) {
                  var child = parent.children[i];
                  child.style.fontFamily = "'Bebas Neue', sans-serif";
                  styleAllChildren(child);
                }
              }
              
              // Start the recursion
              styleAllChildren(element);
            }
            
            // Function to try to style the form in an iframe
            function tryToStyleIframe(iframe) {
              try {
                // Get iframe document
                var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                
                // Add stylesheet to iframe
                var style = document.createElement('style');
                style.textContent = "* { font-family: 'Bebas Neue', sans-serif !important; }";
                iframeDoc.head.appendChild(style);
                
                // Add font link
                var fontLink = document.createElement('link');
                fontLink.href = 'https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap';
                fontLink.rel = 'stylesheet';
                iframeDoc.head.appendChild(fontLink);
                
                // Apply inline styles to all elements
                applyStylesToElement(iframeDoc.body);
                
              } catch(e) {
                // Cross-origin restrictions may prevent this
                console.log('Could not access iframe contents due to security restrictions');
              }
            }
            
            // Function to style forms once they appear
            function styleFormsAndIframes() {
              // Target the forms directly
              var cognitoForms = document.querySelectorAll('[id^="c-forms-form-"]');
              cognitoForms.forEach(applyStylesToElement);
              
              // Target any Cognito iframes
              var cognitoIframes = document.querySelectorAll('iframe[src*="cognitoforms.com"]');
              cognitoIframes.forEach(tryToStyleIframe);
            }
            
            // Setup a mutation observer to watch for the form being added to the DOM
            var observer = new MutationObserver(function(mutations) {
              mutations.forEach(function(mutation) {
                // Check if any new nodes were added
                if (mutation.addedNodes && mutation.addedNodes.length > 0) {
                  // Check for forms or iframes
                  for (var i = 0; i < mutation.addedNodes.length; i++) {
                    var node = mutation.addedNodes[i];
                    if (node.id && node.id.indexOf('c-forms-form') !== -1) {
                      applyStylesToElement(node);
                    }
                    if (node.tagName === 'IFRAME' && node.src && node.src.indexOf('cognitoforms.com') !== -1) {
                      tryToStyleIframe(node);
                    }
                  }
                }
              });
              
              // Also try to style all forms and iframes
              styleFormsAndIframes();
            });
            
            // Watch the entire document for changes
            observer.observe(document.documentElement, {
              childList: true,
              subtree: true
            });
            
            // Try immediately
            styleFormsAndIframes();
            
            // Also try after page is fully loaded
            window.addEventListener('load', styleFormsAndIframes);
            
            // And try again after a delay to catch late-loading forms
            setTimeout(styleFormsAndIframes, 1000);
            setTimeout(styleFormsAndIframes, 2000);
            setTimeout(styleFormsAndIframes, 5000);
          })();
        </script>

  <script>
    $(document).ready(function() {
      document.getElementById('copyright-year').textContent = new Date().getFullYear();
      
      // Custom styling for Cognito Forms with Bebas Neue
      function applyCognitoStyling() {
        // Create a style element
        var cognitoStyle = document.createElement('style');
        cognitoStyle.innerHTML = `
          @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
          .cognito * { font-family: 'Bebas Neue', sans-serif !important; }
          .cognito input, .cognito select, .cognito textarea, .cognito button { font-family: 'Bebas Neue', sans-serif !important; }
          .cognito .c-forms-heading { font-family: 'Bebas Neue', sans-serif !important; }
          .cognito .c-button { font-family: 'Bebas Neue', sans-serif !important; letter-spacing: 1px; }
        `;
        
        // Try to inject into Cognito iframe if it exists
        var cognitoIframe = document.querySelector('iframe[src*="cognitoforms"]');
        if (cognitoIframe) {
          try {
            setTimeout(function() {
              if (cognitoIframe.contentDocument) {
                cognitoIframe.contentDocument.head.appendChild(cognitoStyle.cloneNode(true));
              }
            }, 1000); // Wait for iframe to load
          } catch (e) {
            console.log('Could not access Cognito iframe content');
          }
        }
        
        // Also add to main document to catch any cognito elements that aren't in an iframe
        document.head.appendChild(cognitoStyle);
      }
      
      // Run styling function initially
      applyCognitoStyling();
      
      // Also run when the Cognito script might finish loading
      setTimeout(applyCognitoStyling, 2000);
    });
  </script>
